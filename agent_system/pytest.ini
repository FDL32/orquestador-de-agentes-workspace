[pytest]
# Configuracion de pytest del proyecto.
# Evitamos forzar un basetemp local desde aqui porque en esta sandbox
# puede dejar directorios temporales con ACL rotas entre ejecuciones.
tmp_path_retention_policy = none

# Ignorar los archivos de salida de pruebas temporales
norecursedirs = .pytest_tmp _pytest_tmp* .pytest_cache .agent __pycache__

# Mantener la salida silenciosa salvo fallos
log_cli = false
