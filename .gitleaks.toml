title = "workspace gitleaks config"

# Extiende el ruleset por defecto de gitleaks (no lo reemplaza).
[extend]
useDefault = true

# Falsos positivos conocidos (no son credenciales reales). Se suprimen por
# regex del valor EXACTO (tight): no ocultan secretos reales, solo estos
# strings concretos, en cualquier commit de la historia que gitleaks escanea
# con fetch-depth: 0.
#
# 1) Placeholder didactico en docs de anti-patrones.
#    `agent_system/docs/reference/anti-patterns.md` (borrado de HEAD en
#    WOT-2026-002c, presente en historia) ENSENA el anti-patron de meter
#    secretos en repo. Valor ficticio:
#      # API_KEY=sk_live_1234567890   -> rule stripe-access-token
#
# 2) SHA de commit PUBLICO de un repo externo (stablyai-orca), registrado por
#    el ticket repo-compare WT-2026-236a en execution_log.md:
#      "SHA obtenido via GitHub API publica: 9c92e3d4..." -> rule generic-api-key
#    Es un SHA-1 git publico (no un objeto de ESTE repo), no una credencial.
[allowlist]
description = "Falsos positivos conocidos: placeholder didactico + SHA git publico"
regexes = [
  '''sk_live_1234567890''',
  '''9c92e3d47b3ccb3d8300f9dc59b63716bed22712''',
]
