name: Quality Gates

on:
  push:
    branches: [main, develop, '*/feature/**', '*/fix/**']
    paths:
      - 'orquestacion_agentes/agent_system/**'
      - 'orquestacion_agentes/scripts/**'
      - 'scripts/**'
      - '.github/workflows/quality-gates.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'orquestacion_agentes/agent_system/**'
      - 'scripts/**'

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./orquestacion_agentes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install uv
        run: |
          pip install uv
      
      - name: Install dependencies
        run: |
          uv sync --all-groups

      - name: Conditional Checks
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          echo "Running quality checks for modified paths"

      - name: Ruff check (linting) - Selective
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          uv run ruff check . --fix
        continue-on-error: false

      - name: Ruff format (code style) - Selective
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          uv run ruff format . --check
        continue-on-error: false

      - name: Mypy type checking - Selective
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          uv run mypy . --strict --ignore-missing-imports
        continue-on-error: true

      - name: Pytest (unit tests) - Selective
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          python scripts/run_pytest_safe.py --tb=short
        continue-on-error: true

      - name: Skill discovery validation - Selective
        if: |
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'orquestacion_agentes/')) ||
          (github.event_name == 'push' && contains(github.event.head_commit.modified, 'scripts/')) ||
          (github.event_name == 'pull_request')
        run: |
          python scripts/discover_skills.py --json | python -m json.tool > /tmp/skills.json
          python -c "
          import json
          with open('/tmp/skills.json') as f:
              data = json.load(f)
              assert data['total_skills'] == 13, f'Expected 13 skills, got {data[\"total_skills\"]}'
              assert data['total_triggers'] == 38, f'Expected 38 triggers, got {data[\"total_triggers\"]}'
          print('✓ Skill discovery validation passed')
          "
        continue-on-error: false

      - name: Summary - Selective
        if: always() && ((github.event_name == 'push' && (contains(github.event.head_commit.modified, 'orquestacion_agentes/') || contains(github.event.head_commit.modified, 'scripts/'))) || github.event_name == 'pull_request')
        run: |
          echo "## Quality Gates Summary (Selective Run)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Ruff check (linting)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Ruff format (code style)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Mypy (type checking)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Pytest (unit tests)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Skill discovery (13 skills, 38 triggers)" >> $GITHUB_STEP_SUMMARY
        continue-on-error: false

      - name: Summary - Skipped
        if: always() && (github.event_name == 'push' && !(contains(github.event.head_commit.modified, 'orquestacion_agentes/') || contains(github.event.head_commit.modified, 'scripts/')))
        run: |
          echo "## Quality Gates Summary (Skipped - No Relevant Changes)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ No changes to orquestacion_agentes/ or scripts/ detected" >> $GITHUB_STEP_SUMMARY
          echo "- CI bypassed for performance" >> $GITHUB_STEP_SUMMARY