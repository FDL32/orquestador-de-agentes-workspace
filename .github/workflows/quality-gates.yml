name: Quality Gates

on:
  push:
    branches: [main, develop, '*/feature/**', '*/fix/**']
    paths:
      - '.agent/**'
      - 'agent_system/**'
      - 'scripts/**'
      - 'skills/**'
      - 'tests/**'
      - '.github/workflows/quality-gates.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '.agent/**'
      - 'agent_system/**'
      - 'scripts/**'
      - 'skills/**'
      - 'tests/**'
      - '.github/workflows/quality-gates.yml'

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compile workspace Python files
        run: |
          python -m compileall scripts tests

      - name: Skill discovery validation
        run: |
          if [ -f scripts/discover_skills.py ]; then
            python scripts/discover_skills.py --json | python -m json.tool > /tmp/skills.json
            python -c "import json; data=json.load(open('/tmp/skills.json')); assert data.get('total_skills', 0) >= 1; print('Skill discovery validation passed')"
          else
            echo "scripts/discover_skills.py not present; skipping"
          fi

      - name: Workflow reference check
        run: |
          python - <<'PY'
          from pathlib import Path
          bad = []
          for path in Path('.github/workflows').glob('*.yml'):
              text = path.read_text(encoding='utf-8')
              bad_tokens = ('orquestacion' + '_agentes', 'actions/upload-artifact' + '@v3')
              for token in bad_tokens:
                  if token in text:
                      bad.append(f'{path}: {token}')
          if bad:
              raise SystemExit('\n'.join(bad))
          print('Workflow references look current')
          PY

      - name: Summary
        if: always()
        run: |
          echo "## Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Python compileall" >> $GITHUB_STEP_SUMMARY
          echo "- Skill discovery" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow reference check" >> $GITHUB_STEP_SUMMARY