name: Quality Gates

# Host-extends / motor-provides (WOT-AUDIT-CI):
# The destination is a pure agent workspace; it does not vendor the engine.
# CI checks out the PUBLIC engine repo and validates the destination's own
# .agent/ operational state with the engine's controller. It must not depend on
# local copies of scripts/ tests/ skills/ (removed by WOT-AUDIT-A2d).

on:
  push:
    branches: [main, develop, '*/feature/**', '*/fix/**']
    paths:
      - '.agent/**'
      - '.claude/**'
      - '.github/workflows/quality-gates.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '.agent/**'
      - '.claude/**'
      - '.github/workflows/quality-gates.yml'

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination
        uses: actions/checkout@v4

      - name: Checkout engine (public motor)
        uses: actions/checkout@v4
        with:
          repository: FDL32/orquestador-de-agentes
          path: _motor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate destination .agent state (engine controller)
        env:
          AGENT_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          python _motor/.agent/agent_controller.py --validate --json --project-root . | tee validate.json
          python -c "import json; d=json.load(open('validate.json')); e=sum(len(v) for v in d['errors'].values()); w=sum(len(v) for v in d['warnings'].values()); print(f'validate errors={e} warnings={w}'); raise SystemExit(1 if e else 0)"

      - name: Claude settings portability/security gate
        # Runs the engine's canonical gate (003c) against the destination's own
        # tracked .claude/settings.json: catches personal grants and fail-open
        # hook regressions in CI, not only in the engine pre-commit (003f).
        run: |
          python _motor/scripts/check_claude_settings_portability.py .claude/settings.json

      - name: Workflow reference check
        run: |
          python - <<'PY'
          from pathlib import Path
          bad = []
          for path in Path('.github/workflows').glob('*.yml'):
              text = path.read_text(encoding='utf-8')
              bad_tokens = ('orquestacion' + '_agentes', 'actions/upload-artifact' + '@v3')
              for token in bad_tokens:
                  if token in text:
                      bad.append(f'{path}: {token}')
          if bad:
              raise SystemExit('\n'.join(bad))
          print('Workflow references look current')
          PY

      - name: Summary
        if: always()
        run: |
          echo "## Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Engine checkout (public motor)" >> $GITHUB_STEP_SUMMARY
          echo "- Destination .agent state validate (engine controller)" >> $GITHUB_STEP_SUMMARY
          echo "- Claude settings portability/security gate" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow reference check" >> $GITHUB_STEP_SUMMARY
