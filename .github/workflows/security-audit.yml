name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - '.agent/**'
      - 'agent_system/**'
      - 'scripts/**'
      - 'skills/**'
      - 'tests/**'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gitleaks (OSS CLI)
        # Replaces gitleaks/gitleaks-action@v2 (license-gated JS/Docker action) with
        # the OSS gitleaks CLI, mirroring the engine's security-audit (motor
        # WOT-2026-010x). Removes the JS-action runtime that the hosted runner traces
        # on job bootstrap (the source of the intermittent HostTraceListener encoding
        # crash) and the GITLEAKS_LICENSE / Node-20-deprecation exposure. Default
        # rules: the workspace does not vendor the engine's gitleaks config, and a
        # local full-history scan (506 commits) is clean under defaults. Fail-closed:
        # --exit-code 1 makes the step fail on a detected leak.
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
          ./gitleaks detect --source . --redact --exit-code 1 --log-opts="--all"

      - name: pip-audit
        if: hashFiles('pyproject.toml', 'requirements*.txt') != ''
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: SBOM generation
        if: hashFiles('pyproject.toml') != ''
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: ignore

      - name: Security Summary
        if: always()
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks" >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit when dependency manifests exist" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM when pyproject.toml exists" >> $GITHUB_STEP_SUMMARY